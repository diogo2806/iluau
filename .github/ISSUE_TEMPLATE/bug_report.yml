name: Relato de bug
description: Algo não está funcionando corretamente
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Antes de relatar, confira a [documentação do iLuau](https://github.com/diogo2806/iluau)
        e as [Discussions](https://github.com/diogo2806/iluau/discussions).
  - type: input
    id: os
    attributes:
      label: Sistema operacional
      placeholder: "macOS 14 / Windows 11"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Versão do Node.js
      placeholder: "saída de node --version"
    validations:
      required: true
  - type: input
    id: ai-client
    attributes:
      label: Cliente de IA
      placeholder: "Claude Code 1.x / Cursor 0.4x / Codex CLI"
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Versão do plugin / servidor MCP
      placeholder: "v1.3.1"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (se houver)
      render: shell
