name: Sugestão de recurso
description: Sugira um novo recurso ou melhoria
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Que problema isso resolve?
      placeholder: "ex.: não consigo fazer X facilmente com as ferramentas atuais"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
