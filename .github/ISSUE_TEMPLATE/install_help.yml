name: Ajuda com instalação
description: Dificuldade para instalar ou conectar
labels: ["question", "installation"]
body:
  - type: markdown
    attributes:
      value: |
        **Primeiro:** confira o [README do iLuau](https://github.com/diogo2806/iluau/blob/main/README.md).
        Para perguntas gerais, use as [Discussions](https://github.com/diogo2806/iluau/discussions).
  - type: dropdown
    id: ai-client
    attributes:
      label: Cliente de IA
      options:
        - Claude Code
        - Claude Desktop
        - Cursor
        - Codex CLI
        - Gemini CLI
        - Outro
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Sistema operacional
      placeholder: "macOS 14 / Windows 11"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Versão do Node.js
      placeholder: "saída de node --version"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: O que está acontecendo?
      placeholder: "Descreva o problema e quaisquer mensagens de erro"
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: O que você já tentou?
